<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Computer Equipment Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --sidebar: #0f172a;
      --sidebar-hover: #1e3a8a;
      --primary: #2563eb;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .wrapper {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, var(--sidebar), #13294f);
      color: #fff;
      padding: 1rem 0;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .sidebar-brand {
      font-size: 1.5rem;
      font-weight: 800;
      text-align: center;
      padding: 0.5rem 0 1.1rem;
      letter-spacing: 0.06em;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .sidebar-nav a {
      color: #dbe7ff;
      text-decoration: none;
      padding: 0.9rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin: 0 0.7rem;
      border-radius: 12px;
      transition: all 0.2s ease;
    }

    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      background: var(--sidebar-hover);
      color: #fff;
    }

    .content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
    }

    .main-body {
      padding: 1.5rem;
      background: var(--bg);
    }

    .card {
      border: none;
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .stat-card {
      min-height: 130px;
      border-radius: 16px;
      color: #fff;
    }

    .stat-label { font-size: 0.9rem; opacity: 0.9; }
    .stat-value { font-size: 2rem; font-weight: 700; }

    @media (max-width: 768px) {
      .wrapper { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: relative; }
      .topbar { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
      .main-body { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <aside class="sidebar">
      <div class="sidebar-brand">CEMS</div>
      <nav class="sidebar-nav">
        <a href="#" class="active">📊 Dashboard</a>
        <a href="#">💻 Equipment</a>
        <a href="#">📈 Reports</a>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h4 class="mb-0">Computer Equipment Management System</h4>
        </div>
        <div class="d-flex align-items-center gap-3">
          <span class="text-muted">Welcome, admin</span>
          <a href="#" class="btn btn-sm btn-outline-secondary">Logout</a>
        </div>
      </header>

      <section class="main-body">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="mb-0">Dashboard</h2>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-sm-6 col-xl-2">
            <div class="card stat-card bg-primary">
              <div class="card-body">
                <div class="stat-label">Total Devices</div>
                <div class="stat-value">24</div>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-xl-2">
            <div class="card stat-card bg-info">
              <div class="card-body">
                <div class="stat-label">Computers</div>
                <div class="stat-value">8</div>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-xl-2">
            <div class="card stat-card bg-success">
              <div class="card-body">
                <div class="stat-label">Laptops</div>
                <div class="stat-value">7</div>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-xl-2">
            <div class="card stat-card bg-warning text-dark">
              <div class="card-body">
                <div class="stat-label">Printers</div>
                <div class="stat-value">3</div>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-xl-2">
            <div class="card stat-card bg-danger">
              <div class="card-body">
                <div class="stat-label">Under Repair</div>
                <div class="stat-value">2</div>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-xl-2">
            <div class="card stat-card bg-secondary">
              <div class="card-body">
                <div class="stat-label">Working</div>
                <div class="stat-value">18</div>
              </div>
            </div>
          </div>
        </div>

        <div class="row g-4">
          <div class="col-lg-6">
            <div class="card">
              <div class="card-body">
                <h5 class="card-title">Equipment by Type</h5>
                <canvas id="typeChart"></canvas>
              </div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="card">
              <div class="card-body">
                <h5 class="card-title">Equipment by Status</h5>
                <canvas id="statusChart"></canvas>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    new Chart(document.getElementById('typeChart'), {
      type: 'doughnut',
      data: {
        labels: ['Computer', 'Laptop', 'Printer', 'Monitor', 'Network Device'],
        datasets: [{
          data: [8, 7, 3, 4, 2],
          backgroundColor: ['#0d6efd', '#198754', '#ffc107', '#dc3545', '#6c757d']
        }]
      },
      options: { responsive: true }
    });

    new Chart(document.getElementById('statusChart'), {
      type: 'bar',
      data: {
        labels: ['Working', 'Maintenance', 'Repair', 'Decommissioned'],
        datasets: [{
          label: 'Count',
          data: [18, 3, 2, 1],
          backgroundColor: ['#0d6efd', '#198754', '#ffc107', '#dc3545']
        }]
      },
      options: {
        responsive: true,
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
      }
    });
  </script>
</body>
</html>
